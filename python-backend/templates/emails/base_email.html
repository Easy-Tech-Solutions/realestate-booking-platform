<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block subject %}Notification{% endblock %} | {{ site_name }}</title>
  <style>
    body { margin:0; padding:0; background:#f4f6f8; font-family: Arial, sans-serif; color:#333; }
    .wrapper { max-width:600px; margin:32px auto; background:#fff; border-radius:8px; overflow:hidden; box-shadow:0 2px 8px rgba(0,0,0,.08); }
    .header  { background:#1a3c5e; padding:24px 32px; }
    .header h1 { margin:0; color:#fff; font-size:20px; font-weight:700; letter-spacing:.5px; }
    .header p  { margin:4px 0 0; color:#a8c0d6; font-size:13px; }
    .body    { padding:32px; }
    .body h2 { margin-top:0; font-size:22px; color:#1a3c5e; }
    .body p  { line-height:1.6; margin:12px 0; }
    .cta-btn { display:inline-block; margin:20px 0; padding:12px 28px; background:#1a3c5e; color:#fff !important; text-decoration:none; border-radius:6px; font-size:15px; font-weight:600; }
    .info-box { background:#f0f5fa; border-left:4px solid #1a3c5e; padding:16px 20px; border-radius:4px; margin:20px 0; }
    .info-box p { margin:6px 0; font-size:14px; }
    .info-box strong { color:#1a3c5e; }
    .divider { border:none; border-top:1px solid #e8edf2; margin:24px 0; }
    .footer  { background:#f4f6f8; padding:20px 32px; text-align:center; font-size:12px; color:#999; }
    .footer a { color:#1a3c5e; text-decoration:none; }
    @media (max-width:600px) {
      .wrapper { margin:0; border-radius:0; }
      .body    { padding:24px 20px; }
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <!-- Header -->
    <div class="header">
      <h1>{{ site_name }}</h1>
      <p>Real Estate Booking Platform</p>
    </div>

    <!-- Body -->
    <div class="body">
      {% block content %}{% endblock %}
    </div>

    <!-- Footer -->
    <div class="footer">
      <p>
        You received this email because you have an account on {{ site_name }}.<br/>
        To manage your notification preferences, visit your
        <a href="http://{{ site_url }}/settings/notifications">account settings</a>.
      </p>
      <p>&copy; {{ site_name }}. All rights reserved.</p>
    </div>
  </div>
</body>
</html>
