name: Security Checks

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 3 * * 1'   # Weekly Monday 03:00 UTC — catches new CVEs in existing deps

jobs:
  # ── Backend: Python / Django ──────────────────────────────────────────────
  backend-security:
    name: Backend Static Analysis
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install deps + security tools
        run: pip install -r requirements.txt bandit pip-audit semgrep

      - name: Bandit (Python static analysis)
        run: |
          bandit -r . -ll -ii -f json -o bandit-report.json \
            --exclude ./migrations,./static \
            --exit-zero
          python - <<'EOF'
          import json, sys
          with open('bandit-report.json') as f:
              d = json.load(f)
          high = [r for r in d['results'] if r['issue_severity'] == 'HIGH']
          if high:
              for r in high:
                  print(f"HIGH: {r['filename']}:{r['line_number']} — {r['issue_text']}")
              sys.exit(1)
          print(f"Bandit: 0 HIGH issues ({len(d['results'])} total below threshold)")
          EOF

      - name: pip-audit (dependency CVEs)
        run: pip-audit -r requirements.txt --desc

      - name: Semgrep (Django rules + secret patterns)
        run: semgrep --config=p/django --config=p/secrets . --error

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bandit-report
          path: backend/bandit-report.json

  # ── Frontend: Node / React ────────────────────────────────────────────────
  frontend-security:
    name: Frontend Static Analysis
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci

      - name: npm audit (HIGH+)
        run: npm audit --audit-level=high

      - name: Semgrep (React + TypeScript rules)
        run: semgrep --config=p/react --config=p/typescript src/ --error

  # ── Secret detection ──────────────────────────────────────────────────────
  secrets-scan:
    name: Secret Detection (Gitleaks)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0    # full history so Gitleaks can walk all commits

      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
