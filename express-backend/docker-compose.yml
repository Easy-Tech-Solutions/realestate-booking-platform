version: "3.9"

services:
  web:
    image: python:3.11-slim
    working_dir: /app
    env_file:
      - .env
    command: >
      sh -c "pip install --no-cache-dir -r requirements/prod.txt && \
             python manage.py migrate && \
             gunicorn realestate_platform.wsgi:application --bind 0.0.0.0:8000"
    ports:
      - "8000:8000"
    volumes:
      - ./:/app
    depends_on:
      - db
      - redis

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: realestate
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  worker:
    image: python:3.11-slim
    working_dir: /app
    env_file:
      - .env
    command: >
      sh -c "pip install --no-cache-dir -r requirements/prod.txt && \
             celery -A realestate_platform worker -l info"
    volumes:
      - ./:/app
    depends_on:
      - redis
      - db

volumes:
  pgdata: {}
