services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    restart: unless-stopped
    env_file:
      - backend/.env
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - backend_logs:/app/logs
      - ./backend/media:/app/media
      - static_files:/app/static
    expose:
      - "8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -f -H 'Host: homekonet.com' http://localhost:8000/api/health/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  celery:
    build:
      context: .
      dockerfile: Dockerfile.backend
    restart: unless-stopped
    command: celery -A realestate_backend worker --loglevel=info --concurrency=2
    env_file:
      - backend/.env
    depends_on:
      redis:
        condition: service_healthy
      backend:
        condition: service_started
    volumes:
      - backend_logs:/app/logs

  celery-beat:
    build:
      context: .
      dockerfile: Dockerfile.backend
    restart: unless-stopped
    command: celery -A realestate_backend beat --loglevel=info
    env_file:
      - backend/.env
    depends_on:
      redis:
        condition: service_healthy
      backend:
        condition: service_started
    volumes:
      - backend_logs:/app/logs

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_API_URL: https://homekonet.com
        VITE_WS_URL: wss://homekonet.com
        VITE_STRIPE_PUBLISHABLE_KEY: ${VITE_STRIPE_PUBLISHABLE_KEY:-}
        VITE_GOOGLE_OAUTH_CLIENT_ID: ${VITE_GOOGLE_OAUTH_CLIENT_ID:-}
    restart: unless-stopped
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./backend/media:/app/media:ro
      - static_files:/usr/share/nginx/html/static:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend

volumes:
  redis_data:
  backend_logs:
  static_files:
