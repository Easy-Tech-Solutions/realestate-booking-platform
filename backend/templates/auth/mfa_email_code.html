<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Your verification code - {{ site_name }}</title>
</head>
<body style="margin:0; padding:0; background-color:#f6f7f6; font-family: Arial, Helvetica, sans-serif; color:#1a1a1a;">
    <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%" style="background-color:#f6f7f6;">
        <tr>
            <td align="center" style="padding:32px 16px;">
                <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="560" style="max-width:560px; background-color:#ffffff; border-radius:8px;">
                    <tr>
                        <td style="padding:32px 32px 16px 32px;">
                            <h1 style="margin:0 0 16px 0; font-size:22px; line-height:1.3; color:#004406;">Your {{ site_name }} verification code</h1>
                            <p style="margin:0 0 12px 0; font-size:15px; line-height:1.5;">Hello {{ user.username }},</p>
                            <p style="margin:0 0 24px 0; font-size:15px; line-height:1.5;">Use this code to finish logging in. It expires in {{ expiry_minutes }} minutes.</p>
                        </td>
                    </tr>
                    <tr>
                        <td align="center" style="padding:0 32px 32px 32px;">
                            <div style="display:inline-block; padding:16px 32px; font-size:32px; font-weight:700; letter-spacing:8px; color:#004406; background-color:#f0f6f0; border-radius:8px;">
                                {{ code }}
                            </div>
                        </td>
                    </tr>
                    <tr>
                        <td style="padding:0 32px 24px 32px;">
                            <p style="margin:0; font-size:13px; line-height:1.5; color:#555555;">If you didn't try to log in, you can ignore this email — your account is still safe.</p>
                        </td>
                    </tr>
                    <tr>
                        <td style="padding:16px 32px 32px 32px; border-top:1px solid #ececec;">
                            <p style="margin:0; font-size:12px; line-height:1.5; color:#888888;">Best regards,<br><strong style="color:#004406;">Home Konet</strong> &middot; Easy.Tech Solutions</p>
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
</body>
</html>
