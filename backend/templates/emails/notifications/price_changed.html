{% extends "emails/notifications/base_email.html" %}
{% block content %}
<h2 style="margin:0 0 8px;color:#111111;font-size:22px;font-weight:700;">Price {{ data.direction|title }} — {{ data.listing_title }}</h2>
<p style="margin:0 0 24px;color:#666666;font-size:14px;">A property you saved has updated pricing</p>
<table width="100%" cellpadding="0" cellspacing="0" style="background:#f9f9f9;border-radius:6px;padding:20px;margin:0 0 24px;">
  <tr><td style="padding:5px 0;font-size:15px;color:#111111;"><strong>Was:</strong> ${{ data.old_price }}/night</td></tr>
  <tr><td style="padding:5px 0;font-size:15px;color:#111111;"><strong>Now:</strong> ${{ data.new_price }}/night</td></tr>
</table>
<a href="{{ site_url }}/listings/{{ data.listing_id }}" style="display:inline-block;background:#111111;color:#ffffff;padding:12px 28px;border-radius:6px;text-decoration:none;font-weight:700;font-size:14px;">View Property</a>
{% endblock %}
