{% extends "emails/notifications/base_email.html" %}
{% block content %}
<h2 style="margin:0 0 8px;color:#111111;font-size:22px;font-weight:700;">Your Stay is Complete!</h2>
<p style="margin:0 0 24px;color:#666666;font-size:14px;">We hope you had a wonderful time</p>
<table width="100%" cellpadding="0" cellspacing="0" style="background:#f9f9f9;border-radius:6px;padding:20px;margin:0 0 24px;">
  <tr><td style="padding:5px 0;font-size:15px;color:#111111;"><strong>Property:</strong> {{ data.listing_title }}</td></tr>
</table>
<p style="margin:0 0 24px;color:#444444;font-size:15px;line-height:1.6;">Help future guests by sharing your experience. It only takes a minute!</p>
<a href="{{ site_url }}/trips" style="display:inline-block;background:#111111;color:#ffffff;padding:12px 28px;border-radius:6px;text-decoration:none;font-weight:700;font-size:14px;">Leave a Review</a>
{% endblock %}
