{% extends "emails/notifications/base_email.html" %}
{% block content %}
<h2 style="margin:0 0 8px;color:#111111;font-size:22px;font-weight:700;">Payment Successful</h2>
<p style="margin:0 0 24px;color:#666666;font-size:14px;">Your transaction has been processed</p>
<table width="100%" cellpadding="0" cellspacing="0" style="background:#f0faf0;border-radius:6px;padding:20px;margin:0 0 24px;border-left:4px solid #22c55e;">
  <tr><td style="padding:5px 0;font-size:15px;color:#111111;"><strong>Property:</strong> {{ data.listing_title }}</td></tr>
  <tr><td style="padding:5px 0;font-size:15px;color:#111111;"><strong>Amount:</strong> {{ data.amount }} {{ data.currency }}</td></tr>
  <tr><td style="padding:5px 0;font-size:15px;color:#111111;"><strong>Reference:</strong> #{{ data.payment_id }}</td></tr>
</table>
<a href="{{ site_url }}/trips" style="display:inline-block;background:#111111;color:#ffffff;padding:12px 28px;border-radius:6px;text-decoration:none;font-weight:700;font-size:14px;">View Booking</a>
{% endblock %}
