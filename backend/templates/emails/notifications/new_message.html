{% extends "emails/notifications/base_email.html" %}
{% block content %}
<h2 style="margin:0 0 8px;color:#111111;font-size:22px;font-weight:700;">New Message from {{ data.sender_name }}</h2>
<p style="margin:0 0 24px;color:#666666;font-size:14px;">{% if data.listing_title %}Re: {{ data.listing_title }}{% else %}Direct message{% endif %}</p>
<div style="background:#f5f5f5;border-radius:8px;padding:16px;margin:0 0 24px;border-left:3px solid #111111;">
  <p style="margin:0;font-size:15px;color:#333333;line-height:1.6;font-style:italic;">"{{ notification.message }}"</p>
</div>
<a href="{{ site_url }}/messages" style="display:inline-block;background:#111111;color:#ffffff;padding:12px 28px;border-radius:6px;text-decoration:none;font-weight:700;font-size:14px;">Reply</a>
{% endblock %}
